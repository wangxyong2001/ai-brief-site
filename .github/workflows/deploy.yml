name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff flake8

      - name: Run Ruff
        run: ruff check . --ignore E501 || true

      - name: Run Flake8
        run: flake8 . --max-line-length=120 --exclude=__pycache__,.git || true

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run health check tests
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from config import *
          print(f'Config loaded: API_PORT={API_PORT}')
          print('All imports successful')
          "

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://ai-brief.tomabc.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH }}

            # Create backup of current deployment
            BACKUP_DIR="backups/$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            if [ -f "docker-compose.yml" ]; then
              cp docker-compose.yml "$BACKUP_DIR/"
              cp -r data "$BACKUP_DIR/" 2>/dev/null || true
            fi

            # Pull latest code
            git fetch origin
            git reset --hard origin/main

            # Set environment variables
            export GLM_API_KEY="${{ secrets.GLM_API_KEY }}"

            # Build and deploy
            docker-compose build --no-cache
            docker-compose down
            docker-compose up -d

            # Wait for health check
            echo "Waiting for application to start..."
            sleep 15

            # Health check with retry
            MAX_RETRIES=5
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f http://localhost:8080/health; then
                echo "Health check passed!"
                break
              fi
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "Health check failed, retry $RETRY_COUNT/$MAX_RETRIES"
              sleep 5
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "Deployment failed, rolling back..."
              docker-compose down
              if [ -f "$BACKUP_DIR/docker-compose.yml" ]; then
                cp "$BACKUP_DIR/docker-compose.yml" .
                docker-compose up -d
              fi
              exit 1
            fi

            # Cleanup old images
            docker image prune -f

            echo "Deployment successful!"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH }}

            # Verify container is running
            if docker ps | grep -q ai-brief-app; then
              echo "Container is running"
            else
              echo "Container not found!"
              exit 1
            fi

            # Check application health
            curl -f http://localhost:8080/health || exit 1

            # Check metrics endpoint
            curl -f http://localhost:8080/metrics || exit 1

            echo "All checks passed!"

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Send success notification
        if: needs.deploy.result == 'success'
        run: |
          echo "Deployment successful!"
          # Add webhook notification here if needed

      - name: Send failure notification
        if: needs.deploy.result == 'failure'
        run: |
          echo "Deployment failed!"
          # Add webhook notification here if needed